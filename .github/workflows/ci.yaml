name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [api, client, cli]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Vet
        run: go vet ./...
        working-directory: ${{ matrix.module }}

      - name: Build
        run: go build ./...
        working-directory: ${{ matrix.module }}

      - name: Test
        run: go test -race -count=1 ./...
        working-directory: ${{ matrix.module }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: api

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: client

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: cli

  docker-build:
    name: Docker Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: deployments/dockerfiles/api.Dockerfile
          - image: client
            dockerfile: deployments/dockerfiles/client.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f ${{ matrix.dockerfile }} .

  gitleaks-contract:
    name: Gitleaks image & contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Gitleaks image
        run: docker build -f deployments/dockerfiles/gitleaks/Dockerfile -t huskyci/gitleaks:ci .

      - name: Assert gitleaks v8
        run: |
          v=$(docker run --rm huskyci/gitleaks:ci gitleaks version | head -1)
          echo "gitleaks version: $v"
          echo "$v" | grep -E 'v?8\.'

      - name: Contract — gitleaks dir on fixture (one finding)
        run: |
          set +e
          out=$(docker run --rm -v "$GITHUB_WORKSPACE/api/securitytest/testdata/gitleaks_e2e_fixture:/scan" \
            huskyci/gitleaks:ci gitleaks dir /scan -f json -r - -l error --no-banner 2>/dev/null)
          ex=$?
          set -e
          if [ "$ex" -ne 0 ] && [ "$ex" -ne 1 ]; then
            echo "gitleaks exited with $ex" >&2
            exit 1
          fi
          echo "$out" | jq -e 'type == "array" and (length == 1) and .[0].RuleID == "github-pat"'

  deployment-shell:
    name: Deployment shell (bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: verify-depl-scripts
        run: bash deployments/scripts/verify-depl-scripts.sh
